<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubank | Internet Banking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <section>
            <h2>Tubank - Visão Geral</h2>
            <div class="dashboard-grid">
                
                <div class="card">
                    <div class="card-title">Saldo em Conta</div>
                    <div class="card-value value-positive">R$ 5.240,50</div>
                </div>

                <div class="card">
                    <div class="card-title">Limite do Cartão</div>
                    <div class="card-value">R$ 3.500,00</div>
                </div>

                <div class="card">
                    <div class="card-title">Fatura Atual</div>
                    <div class="card-value value-negative">- R$ 1.120,85</div>
                </div>

            </div>
        </section>

        <section class="transfer-section">
            <h2>Nova Transferência</h2>
            <form onsubmit="event.preventDefault();">
                
                <div class="form-group">
                    <label for="amount">Valor a transferir</label>
                    <input type="number" id="amount" class="input-money" placeholder="R$ 0,00" step="0.01" min="0.01" required>
                </div>

                <div class="form-group">
                    <label>Tipo de transação</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="transaction_type" value="pix" checked>
                            PIX
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="transaction_type" value="ted">
                            TED
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="transaction_type" value="doc">
                            DOC
                        </label>
                    </div>
                </div>

                <label class="checkbox-container">
                    <input type="checkbox" name="save_contact">
                    <span class="custom-checkbox"></span>
                    Salvar este contato para futuras transferências?
                </label>

                <button type="submit" class="btn-submit">Confirmar Transferência</button>

            </form>
        </section>

    </div>

</body>
</html>
